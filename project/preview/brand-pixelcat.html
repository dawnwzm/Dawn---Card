<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--void-1); font-family:var(--font-mono); }
  .label { font-size:11px; letter-spacing:var(--ls-caps); color:var(--phosphor); text-transform:uppercase; margin-bottom:14px; }
  .stage { background:var(--void-2); height:200px; display:flex; align-items:flex-end; gap:48px; padding:24px; border:var(--border-faint); position:relative; }
  .scan { position:absolute; inset:0; background:repeating-linear-gradient(to bottom,rgba(94,234,212,0.025) 0,rgba(94,234,212,0.025) 1px,transparent 1px,transparent 3px); pointer-events:none; }
  /* Cat using CSS box-shadow pixel art. 8px cells, 12x10 grid. */
  .cat {
    width:8px; height:8px; position:relative; transform:scale(2.5); transform-origin:bottom left;
    --m: var(--phosphor);          /* main body */
    --d: var(--phosphor-deep);     /* shadow */
    --p: var(--accent-cat);        /* nose/pads */
    --e: var(--void-0);            /* eyes */
  }
  /* Build a pixel cat shape. Each 8px shadow is one pixel. */
  .cat.sit {
    box-shadow:
      /* ears row 0 (y=0) */
      16px 0 0 var(--m), 56px 0 0 var(--m),
      /* row 1 */
      8px 8px 0 var(--m), 16px 8px 0 var(--m), 24px 8px 0 var(--m),
      48px 8px 0 var(--m), 56px 8px 0 var(--m), 64px 8px 0 var(--m),
      /* head row 2 */
      8px 16px 0 var(--m), 16px 16px 0 var(--m), 24px 16px 0 var(--m), 32px 16px 0 var(--m),
      40px 16px 0 var(--m), 48px 16px 0 var(--m), 56px 16px 0 var(--m), 64px 16px 0 var(--m),
      /* face row 3  eyes */
      8px 24px 0 var(--m), 16px 24px 0 var(--e), 24px 24px 0 var(--m), 32px 24px 0 var(--m),
      40px 24px 0 var(--m), 48px 24px 0 var(--e), 56px 24px 0 var(--m), 64px 24px 0 var(--m),
      /* row 4 nose */
      8px 32px 0 var(--m), 16px 32px 0 var(--m), 24px 32px 0 var(--m), 32px 32px 0 var(--p),
      40px 32px 0 var(--m), 48px 32px 0 var(--m), 56px 32px 0 var(--m), 64px 32px 0 var(--m),
      /* row 5 body start */
      16px 40px 0 var(--m), 24px 40px 0 var(--m), 32px 40px 0 var(--m), 40px 40px 0 var(--m),
      48px 40px 0 var(--m), 56px 40px 0 var(--m),
      /* row 6 body */
      8px 48px 0 var(--m), 16px 48px 0 var(--m), 24px 48px 0 var(--m), 32px 48px 0 var(--m),
      40px 48px 0 var(--m), 48px 48px 0 var(--m), 56px 48px 0 var(--m), 64px 48px 0 var(--m),
      /* row 7 body bottom + tail */
      8px 56px 0 var(--m), 16px 56px 0 var(--m), 24px 56px 0 var(--m), 32px 56px 0 var(--m),
      40px 56px 0 var(--m), 48px 56px 0 var(--m), 56px 56px 0 var(--m), 64px 56px 0 var(--m),
      72px 48px 0 var(--m), 72px 40px 0 var(--m), 80px 32px 0 var(--m),
      /* row 8 paws */
      16px 64px 0 var(--m), 56px 64px 0 var(--m);
    background:transparent;
  }
  .caption { font-size:12px; color:var(--fg-3); }
  .caption .k { color:var(--phosphor); font-weight:500; display:block; margin-bottom:4px; }
</style></head>
<body>
  <div class="label">[ brand · pixel cats — CSS box-shadow sprites ]</div>
  <div class="stage">
    <div class="scan"></div>
    <div><div class="cat sit"></div></div>
    <div><div class="cat sit" style="filter:hue-rotate(-30deg)"></div></div>
    <div><div class="cat sit" style="filter:hue-rotate(20deg) brightness(1.2)"></div></div>
    <div style="margin-left:auto" class="caption">
      <span class="k">// pixel-cat.sprite</span>
      8×8 cells · drawn with box-shadow<br>
      walks across at random intervals<br>
      sometimes naps next to the cursor
    </div>
  </div>
</body></html>
