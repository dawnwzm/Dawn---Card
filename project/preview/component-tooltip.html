<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--void-1); font-family:var(--font-mono); font-size:13px; }
  .label { font-size:11px; letter-spacing:var(--ls-caps); color:var(--phosphor); text-transform:uppercase; margin-bottom:14px; }
  .bubble { background:var(--void-3); border:var(--border-line); border-radius:8px; padding:14px 16px; color:var(--fg-1); max-width:380px; box-shadow:var(--glow-sm); position:relative; }
  .bubble::before { content:""; position:absolute; left:-7px; top:18px; width:12px; height:12px; background:var(--void-3); border-left:var(--border-line); border-bottom:var(--border-line); transform:rotate(45deg); }
  .bubble .who { font-size:10px; letter-spacing:var(--ls-caps); text-transform:uppercase; color:var(--phosphor); margin-bottom:6px; }
  .bubble .meta { font-size:11px; color:var(--fg-3); margin-bottom:10px; }
  .bubble ul { list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:6px; }
  .bubble li { padding-left:14px; position:relative; color:var(--fg-2); line-height:1.55; font-size:13px; }
  .bubble li::before { content:"▶"; position:absolute; left:0; color:var(--phosphor); font-size:8px; top:6px; }
  .tags { display:flex; gap:6px; margin-top:12px; flex-wrap:wrap; }
  .tag { font-size:10px; padding:2px 7px; border:var(--border-faint); color:var(--fg-3); letter-spacing:var(--ls-caps); text-transform:uppercase; }
</style></head>
<body>
  <div class="label">[ hover-tooltip dialog — IDE-style right panel ]</div>
  <div class="bubble">
    <div class="who">// hovered: 360 集团</div>
    <div class="meta">role · senior aigc engineer<br>2023.06 — 2024.12 · beijing</div>
    <ul>
      <li>主导 AIGC 探索小组，从 0 → 1 搭建内部 prompt 平台</li>
      <li>完成 18 次 diffusion 模型微调实验，3 条业务线落地</li>
      <li>影响日活用户 ~120k，提升内容生成效率 4.2×</li>
    </ul>
    <div class="tags">
      <span class="tag">aigc</span><span class="tag">diffusion</span><span class="tag">platform</span><span class="tag">0→1</span>
    </div>
  </div>
</body></html>
