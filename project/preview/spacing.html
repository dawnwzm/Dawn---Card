<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--void-1); font-family:var(--font-mono); }
  .label { font-size:11px; letter-spacing:var(--ls-caps); color:var(--phosphor); text-transform:uppercase; margin-bottom:14px; }
  .row { display:flex; align-items:center; gap:16px; padding:6px 0; }
  .swatch { background:var(--phosphor); height:24px; flex-shrink:0; }
  .name { font-size:12px; color:var(--fg-1); width:80px; }
  .px { font-size:11px; color:var(--fg-3); width:48px; }
</style></head>
<body>
  <div class="label">[ spacing — 8px base ]</div>
  <div class="row"><span class="name">--s-1</span><span class="px">4</span><span class="swatch" style="width:4px"></span></div>
  <div class="row"><span class="name">--s-2</span><span class="px">8</span><span class="swatch" style="width:8px"></span></div>
  <div class="row"><span class="name">--s-3</span><span class="px">12</span><span class="swatch" style="width:12px"></span></div>
  <div class="row"><span class="name">--s-4</span><span class="px">16</span><span class="swatch" style="width:16px"></span></div>
  <div class="row"><span class="name">--s-5</span><span class="px">24</span><span class="swatch" style="width:24px"></span></div>
  <div class="row"><span class="name">--s-6</span><span class="px">32</span><span class="swatch" style="width:32px"></span></div>
  <div class="row"><span class="name">--s-7</span><span class="px">48</span><span class="swatch" style="width:48px"></span></div>
  <div class="row"><span class="name">--s-8</span><span class="px">64</span><span class="swatch" style="width:64px"></span></div>
  <div class="row"><span class="name">--s-9</span><span class="px">96</span><span class="swatch" style="width:96px"></span></div>
</body></html>
