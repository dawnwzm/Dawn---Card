<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--void-1); }
  .row { display:grid; grid-template-columns:repeat(10,1fr); gap:8px; }
  .sw { aspect-ratio:1; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; border:var(--border-faint); font-family:var(--font-mono); font-size:10px; }
  .sw .v { color:var(--fg-1); font-weight:500; }
  .sw .h { color:var(--fg-3); margin-top:2px; font-size:9px; }
  .label { font-size:11px; letter-spacing:var(--ls-caps); color:var(--phosphor); text-transform:uppercase; margin-bottom:12px; }
</style></head>
<body>
  <div class="label">[ phosphor / mint — chromatic family ]</div>
  <div class="row">
    <div class="sw" style="background:var(--mint-50);color:var(--void-0)"><span class="v">50</span><span class="h" style="color:var(--void-2)">#ecfdf5</span></div>
    <div class="sw" style="background:var(--mint-100);color:var(--void-0)"><span class="v">100</span><span class="h" style="color:var(--void-2)">#d1fae5</span></div>
    <div class="sw" style="background:var(--mint-200);color:var(--void-0)"><span class="v">200</span><span class="h" style="color:var(--void-2)">#a7f3d0</span></div>
    <div class="sw" style="background:var(--mint-300);color:var(--void-0)"><span class="v">300</span><span class="h" style="color:var(--void-2)">#6ee7b7</span></div>
    <div class="sw" style="background:var(--mint-400);color:var(--void-0)"><span class="v">400</span><span class="h" style="color:var(--void-2)">#34d399</span></div>
    <div class="sw" style="background:var(--mint-500)"><span class="v">500</span><span class="h">#10b981</span></div>
    <div class="sw" style="background:var(--mint-600)"><span class="v">600</span><span class="h">#059669</span></div>
    <div class="sw" style="background:var(--mint-700)"><span class="v">700</span><span class="h">#047857</span></div>
    <div class="sw" style="background:var(--mint-800)"><span class="v">800</span><span class="h">#065f46</span></div>
    <div class="sw" style="background:var(--mint-900)"><span class="v">900</span><span class="h">#064e3b</span></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:16px">
    <div class="sw" style="aspect-ratio:auto;height:64px;background:var(--phosphor);color:var(--void-0)"><span class="v">--phosphor</span><span class="h" style="color:var(--void-2)">#5eead4 · screen glow</span></div>
    <div class="sw" style="aspect-ratio:auto;height:64px;background:var(--phosphor-dim);color:var(--void-0)"><span class="v">--phosphor-dim</span><span class="h" style="color:var(--void-2)">#2dd4bf</span></div>
    <div class="sw" style="aspect-ratio:auto;height:64px;background:var(--phosphor-deep)"><span class="v">--phosphor-deep</span><span class="h">#0d9488</span></div>
  </div>
</body></html>
