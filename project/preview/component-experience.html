<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--void-1); font-family:var(--font-mono); font-size:14px; }
  .label { font-size:11px; letter-spacing:var(--ls-caps); color:var(--phosphor); text-transform:uppercase; margin-bottom:14px; }
  .list { display:flex; flex-direction:column; }
  .item { display:grid; grid-template-columns:80px 1fr 120px; gap:24px; align-items:baseline; padding:14px 16px; border-bottom:1px dashed rgba(94,234,212,0.10); transition:all 250ms cubic-bezier(0.2,0.7,0.2,1); position:relative; }
  .item .year { color:var(--fg-4); font-size:12px; }
  .item .name { color:var(--fg-2); font-size:16px; }
  .item .role { color:var(--fg-4); font-size:11px; text-align:right; letter-spacing:var(--ls-caps); text-transform:uppercase; }
  .item.focused { color:var(--phosphor); padding-left:24px; }
  .item.focused .name { color:var(--phosphor); text-shadow:var(--glow-text); font-size:18px; font-weight:500; }
  .item.focused .year, .item.focused .role { color:var(--fg-1); }
  .item.focused::before { content:""; position:absolute; left:0; top:14px; bottom:14px; width:2px; background:var(--phosphor); box-shadow:var(--glow-sm); }
  .item.dim { filter:blur(2.5px); opacity:0.32; }
  .item.dim .name { font-size:14px; }
</style></head>
<body>
  <div class="label">[ experience list — hover focus pattern ]</div>
  <div class="list">
    <div class="item dim"><span class="year">2024 — now</span><span class="name">Independent · AIGC Lab</span><span class="role">founder</span></div>
    <div class="item focused"><span class="year">2023 — 2024</span><span class="name">360 集团</span><span class="role">aigc engineer</span></div>
    <div class="item dim"><span class="year">2021 — 2023</span><span class="name">阿里巴巴 达摩院</span><span class="role">researcher</span></div>
    <div class="item dim"><span class="year">2019 — 2021</span><span class="name">M.S. · 计算机视觉</span><span class="role">grad</span></div>
  </div>
  <div style="margin-top:14px;font-size:11px;color:var(--fg-4);">// hover any row → focus enlarges, others blur · brief spec</div>
</body></html>
