<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--void-1); font-family:var(--font-mono); }
  .label { font-size:11px; letter-spacing:var(--ls-caps); color:var(--phosphor); text-transform:uppercase; margin-bottom:16px; }
  .demo { background:var(--void-2); padding:24px; border:var(--border-faint); }
</style></head>
<body>
  <div class="label">[ VT323 — pixel display font ]</div>
  <div class="demo">
    <div style="font-family:'VT323',monospace;font-size:48px;color:var(--phosphor);text-shadow:var(--glow-text);line-height:1">SCORE: 999999</div>
    <div style="font-family:'VT323',monospace;font-size:24px;color:var(--fg-2);margin-top:8px">a wild pixel cat appears...</div>
    <div style="font-family:'VT323',monospace;font-size:20px;color:var(--accent-cat);margin-top:4px">&lt;3 nyaa~</div>
  </div>
  <div class="label" style="margin-top:24px">[ Space Grotesk — emergency sans (rare) ]</div>
  <div style="font-family:'Space Grotesk',sans-serif;font-size:24px;color:var(--fg-1);font-weight:500">404 / page not found</div>
  <div style="font-family:'Space Grotesk',sans-serif;font-size:14px;color:var(--fg-3);margin-top:6px">used only when the terminal "breaks character" — easter eggs, 404, end credits</div>
</body></html>
