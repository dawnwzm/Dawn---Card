<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--void-1); font-family:var(--font-mono); }
  .label { font-size:11px; letter-spacing:var(--ls-caps); color:var(--phosphor); text-transform:uppercase; margin-bottom:16px; }
  .stack { display:flex; flex-direction:column; gap:14px; }
  .spec { display:flex; align-items:baseline; gap:24px; }
  .spec .meta { color:var(--fg-4); font-size:10px; width:120px; flex-shrink:0; }
  .spec .smp { color:var(--fg-1); }
</style></head>
<body>
  <div class="label">[ JetBrains Mono — weights & styles ]</div>
  <div class="stack">
    <div class="spec"><span class="meta">300 · light</span><span class="smp" style="font-weight:300;font-size:18px">cat ~/about.log</span></div>
    <div class="spec"><span class="meta">400 · regular</span><span class="smp" style="font-weight:400;font-size:18px">cat ~/about.log</span></div>
    <div class="spec"><span class="meta">500 · medium</span><span class="smp" style="font-weight:500;font-size:18px">cat ~/about.log</span></div>
    <div class="spec"><span class="meta">600 · semibold</span><span class="smp" style="font-weight:600;font-size:18px">cat ~/about.log</span></div>
    <div class="spec"><span class="meta">700 · bold</span><span class="smp" style="font-weight:700;font-size:18px">cat ~/about.log</span></div>
    <div class="spec"><span class="meta">italic</span><span class="smp" style="font-style:italic;font-size:18px;color:var(--fg-3)"># comment line</span></div>
    <div class="spec"><span class="meta">phosphor</span><span class="smp" style="color:var(--phosphor);font-size:18px;text-shadow:var(--glow-text)">return dawn</span></div>
  </div>
</body></html>
