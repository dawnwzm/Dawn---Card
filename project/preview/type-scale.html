<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--void-1); font-family:var(--font-mono); }
  .label { font-size:11px; letter-spacing:var(--ls-caps); color:var(--phosphor); text-transform:uppercase; margin-bottom:14px; }
  .row { display:flex; align-items:baseline; gap:20px; padding:8px 0; border-bottom:1px dashed rgba(94,234,212,0.10); }
  .row:last-child { border-bottom:0; }
  .row .meta { color:var(--fg-4); font-size:10px; width:120px; flex-shrink:0; }
  .row .smp { color:var(--fg-1); }
</style></head>
<body>
  <div class="label">[ type scale — log-tight ]</div>
  <div class="row"><span class="meta">--t-hero · 64</span><span class="smp" style="font-size:48px;line-height:1.1;color:var(--phosphor);text-shadow:var(--glow-text)">dawn_</span></div>
  <div class="row"><span class="meta">--t-2xl · 40</span><span class="smp" style="font-size:36px;line-height:1.1">aigc explorer</span></div>
  <div class="row"><span class="meta">--t-xl · 28</span><span class="smp" style="font-size:24px">$ whoami</span></div>
  <div class="row"><span class="meta">--t-lg · 20</span><span class="smp" style="font-size:18px">[ EXPERIENCE ]</span></div>
  <div class="row"><span class="meta">--t-md · 16</span><span class="smp" style="font-size:16px">主导 AIGC 探索小组</span></div>
  <div class="row"><span class="meta">--t-base · 14</span><span class="smp" style="font-size:14px">▶ shipped 18 diffusion fine-tunes across 3 product lines</span></div>
  <div class="row"><span class="meta">--t-sm · 13</span><span class="smp" style="font-size:13px;color:var(--fg-3)">2023.06 — 2024.12 · Beijing</span></div>
  <div class="row"><span class="meta">--t-xs · 11</span><span class="smp" style="font-size:11px;color:var(--fg-4);letter-spacing:var(--ls-caps)">001  002  003  004  005</span></div>
</body></html>
