<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--void-1); font-family:var(--font-mono); }
  .label { font-size:11px; letter-spacing:var(--ls-caps); color:var(--phosphor); text-transform:uppercase; margin-bottom:14px; }
  .stage { background:radial-gradient(ellipse at 50% 60%, #0a1612 0%, var(--void-1) 70%); height:220px; position:relative; overflow:hidden; border:var(--border-faint); }
  .grid-bg { position:absolute; inset:0; background-image:linear-gradient(rgba(94,234,212,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(94,234,212,0.06) 1px,transparent 1px); background-size:24px 24px; mask-image:radial-gradient(ellipse at 50% 60%,black 30%,transparent 80%); }
  .astro { position:absolute; top:18px; right:32px; width:120px; height:auto; filter:drop-shadow(0 0 12px rgba(94,234,212,0.3)); opacity:0.85; animation:float 8s ease-in-out infinite; }
  @keyframes float {
    0%,100% { transform:translate(0,0) rotate(-3deg); }
    33% { transform:translate(-20px,12px) rotate(2deg); }
    66% { transform:translate(8px,-8px) rotate(-1deg); }
  }
  .caption { position:absolute; left:18px; bottom:14px; color:var(--fg-3); font-size:11px; letter-spacing:var(--ls-mono); }
  .caption .k { color:var(--phosphor); }
  .meta { position:absolute; right:18px; top:14px; color:var(--fg-4); font-size:10px; letter-spacing:var(--ls-caps); }
</style></head>
<body>
  <div class="label">[ brand · astronaut — drifting background motif ]</div>
  <div class="stage">
    <div class="grid-bg"></div>
    <img class="astro" src="../assets/astronaut-wave.png" alt="">
    <div class="meta">screen blend · opacity 0.4–0.6</div>
    <div class="caption"><span class="k">astronaut.png</span> · z=0 · lissajous orbit 30s · uploaded by user</div>
  </div>
</body></html>
