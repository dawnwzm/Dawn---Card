<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--void-1); font-family:var(--font-mono); font-size:13px; }
  .label { font-size:11px; letter-spacing:var(--ls-caps); color:var(--phosphor); text-transform:uppercase; margin-bottom:14px; }
  .row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
  .btn { display:inline-flex; align-items:center; gap:8px; padding:8px 14px; font-family:var(--font-mono); font-size:13px; border:var(--border-line); background:transparent; color:var(--fg-1); cursor:pointer; letter-spacing:var(--ls-mono); }
  .btn.primary { color:var(--phosphor); border-color:rgba(94,234,212,0.55); text-shadow:var(--glow-text); }
  .btn.ghost { border-color:rgba(94,234,212,0.10); color:var(--fg-3); }
  .btn:hover { background:var(--void-4); box-shadow:var(--glow-md); color:var(--phosphor); }
  .key { padding:2px 7px; border:var(--border-line); background:var(--void-2); color:var(--fg-2); font-size:11px; border-bottom-width:2px; }
  .dot { width:6px; height:6px; border-radius:999px; display:inline-block; }
  .chip { display:inline-flex; gap:6px; align-items:center; padding:3px 8px; border:var(--border-line); font-size:11px; color:var(--fg-2); letter-spacing:var(--ls-caps); text-transform:uppercase; }
</style></head>
<body>
  <div class="label">[ buttons & keys ]</div>
  <div class="row" style="margin-bottom:16px">
    <button class="btn primary">$ run</button>
    <button class="btn">› inspect</button>
    <button class="btn ghost">esc · back</button>
    <button class="btn" disabled style="opacity:0.3">○ disabled</button>
  </div>
  <div class="label">[ keycaps ]</div>
  <div class="row" style="margin-bottom:16px">
    <span class="key">↑</span><span class="key">↓</span><span class="key">←</span><span class="key">→</span>
    <span style="color:var(--fg-4);font-size:11px">scroll</span>
    <span class="key">esc</span>
    <span style="color:var(--fg-4);font-size:11px">back to /</span>
    <span class="key">/</span>
    <span style="color:var(--fg-4);font-size:11px">search</span>
  </div>
  <div class="label">[ chips & status dots ]</div>
  <div class="row">
    <span class="chip"><span class="dot" style="background:var(--log-ok);box-shadow:0 0 6px var(--log-ok)"></span> shipped</span>
    <span class="chip"><span class="dot" style="background:var(--log-warn);box-shadow:0 0 6px var(--log-warn)"></span> wip</span>
    <span class="chip"><span class="dot" style="background:var(--log-debug)"></span> archived</span>
    <span class="chip" style="border-color:rgba(94,234,212,0.55);color:var(--phosphor)">[ aigc ]</span>
  </div>
</body></html>
